backend:
  name: github
  repo: Obi/games-site

collections:
  - name: "games"
    label: "Games"
    files:
      - file: "games.json"
        label: "Game List"
        name: "gameList"
        fields:
          - label: "Games"
            name: "games"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Image", name: "image", widget: "string" }