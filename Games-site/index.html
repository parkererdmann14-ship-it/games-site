<!DOCTYPE html>
<html>
<head>
  <title>School Games Hub</title>
  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    header { padding:15px; background:#1e293b; text-align:center; font-size:24px; }
    #search { width:80%; margin:15px auto; display:block; padding:10px; border-radius:10px; border:none; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
      gap:15px;
      padding:15px;
    }

    .game {
      background:#1e293b;
      padding:10px;
      border-radius:12px;
      cursor:pointer;
      text-align:center;
    }

    .game:hover { background:#334155; }

    img { width:100%; border-radius:10px; }
  </style>
</head>
<body>

<header>🎮 School Games Hub</header>

<input id="search" placeholder="Search games...">

<div class="grid" id="games"></div>

<script>
let allGames = [];

fetch('games.json')
  .then(res => res.json())
  .then(data => {
    allGames = data;
    displayGames(data);
  });

function displayGames(games){
  const container = document.getElementById('games');
  container.innerHTML = '';

  games.forEach(game => {
    const div = document.createElement('div');
    div.className = 'game';

    div.innerHTML = `
      <img src="${game.image}">
      <p>${game.name}</p>
    `;

    div.onclick = () => {
      window.location = "game.html?src=" + encodeURIComponent(game.url);
    };

    container.appendChild(div);
  });
}

document.getElementById('search').addEventListener('input', e => {
  const filtered = allGames.filter(g =>
    g.name.toLowerCase().includes(e.target.value.toLowerCase())
  );
  displayGames(filtered);
});
</script>

</body>
</html>
